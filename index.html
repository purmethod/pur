<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --w:#FFFFFF;--off:#F8F8F6;--ink:#0A0A0A;--ink2:#3A3A3A;--ink3:#888;
  --gold:#9B7D3A;--line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.04);
  --sci:#EDF6F9;--sci-b:#9CC8D5;--sci-t:#1E5A6A;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--w);color:var(--ink);font-family:'Inter',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden}

/* neuro bg */
.nbg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.04}

/* progress */
.prog{position:fixed;top:0;left:0;right:0;height:2px;background:var(--line);z-index:200}
.prog-f{height:100%;background:var(--gold);transition:width .3s;width:0}

/* nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.35em;font-weight:300;color:var(--ink3);text-transform:uppercase}
.lsw{display:flex;gap:3px}
.lb{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:transparent;border:1px solid var(--line);color:var(--ink3);padding:4px 8px;cursor:pointer;transition:all .2s}
.lb.on,.lb:hover{border-color:var(--gold);color:var(--gold)}

/* layout */
.z{position:relative;z-index:2}
.w{max-width:700px;margin:0 auto;padding:0 24px}
.scr{display:none}.scr.on{display:block}
#sl.on{display:flex;flex-direction:column;min-height:100vh}
#sg.on{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:60px 24px}

/* hero */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative}
.h-brand{font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:32px;opacity:0;animation:fu .8s .1s forwards}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(42px,9vw,82px);font-weight:300;line-height:.95;letter-spacing:-.02em;color:var(--ink);margin-bottom:18px;opacity:0;animation:fu .8s .25s forwards}
.h-title em{font-style:italic;color:var(--gold)}
.h-sub{font-size:14px;font-weight:300;color:var(--ink3);max-width:360px;line-height:1.75;margin-bottom:48px;opacity:0;animation:fu .8s .4s forwards;font-style:italic}
.h-scroll{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fu .8s .6s forwards;cursor:pointer}
.h-scroll-t{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink3)}
.h-scroll-l{width:1px;height:44px;background:linear-gradient(to bottom,var(--ink3),transparent)}

/* about */
#about{padding:100px 0;border-top:1px solid var(--line)}
.sec-tag{font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.sec-h{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,5vw,46px);font-weight:300;line-height:1.05;color:var(--ink);margin-bottom:18px}
.sec-h em{font-style:italic;color:var(--gold)}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.ab{font-size:14px;color:var(--ink2);line-height:1.85;font-style:italic}
.st{padding:18px 0;border-bottom:1px solid var(--line2)}
.st:first-child{border-top:1px solid var(--line2)}
.sn{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--gold);line-height:1;margin-bottom:3px}
.sl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}

/* pillars */
#pillars{padding:100px 0;background:var(--off)}
.pg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:44px}
.pc{background:var(--w);padding:36px 26px;position:relative;overflow:hidden;transition:background .3s}
.pc:hover{background:var(--off)}
.pc-bg{font-family:'Cormorant Garamond',serif;font-size:76px;font-weight:300;color:rgba(0,0,0,.04);line-height:1;position:absolute;right:10px;top:6px;pointer-events:none}
.pc-tag{font-size:9px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.pc-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:10px;line-height:1.15}
.pc-desc{font-size:13px;color:var(--ink2);line-height:1.65;font-style:italic}

/* modules */
#modules{padding:100px 0}
.mi{max-width:520px;margin-bottom:60px}
.mi p{font-size:13px;color:var(--ink3);margin-top:10px;font-style:italic}
.ps{margin-bottom:56px}
.ph{display:flex;align-items:baseline;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:4px}
.pb{font-family:'Cormorant Garamond',serif;font-size:50px;font-weight:300;color:var(--gold);line-height:1}
.ph-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--ink)}
.ph-sub{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink3);margin-top:2px}

/* accordion */
.acc{border-bottom:1px solid var(--line2);overflow:hidden}
.acc-btn{width:100%;background:none;border:none;cursor:pointer;padding:16px 0;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:all .2s}
.acc-btn:hover .at{color:var(--gold)}
.al{display:flex;align-items:baseline;gap:12px}
.an{font-size:10px;color:rgba(0,0,0,.2);min-width:18px}
.at{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--ink);transition:color .2s}
.atg{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,0,0,.2);margin-left:6px}
.ai{font-size:15px;color:rgba(0,0,0,.2);transition:transform .3s,color .2s;flex-shrink:0}
.acc.open .ai{transform:rotate(45deg);color:var(--gold)}
.acc.open .at{color:var(--gold)}
.ab2{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.acc.open .ab2{max-height:420px}
.ain{padding:0 0 20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.atea{font-size:13px;color:var(--ink2);line-height:1.75;grid-column:1;font-style:italic}
.alst{grid-column:2}
.albl{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:500}
.alst ul{list-style:none}
.alst ul li{font-size:12px;color:var(--ink3);padding:3px 0;border-bottom:1px solid var(--line2);display:flex;gap:6px;align-items:center}
.alst ul li::before{content:'—';color:rgba(0,0,0,.15);font-size:9px}

/* science box */
.sci{margin:14px 0;padding:12px 16px;background:var(--sci);border-left:3px solid var(--sci-b)}
.sci-lbl{font-size:9px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--sci-t);margin-bottom:4px}
.sci-txt{font-size:12px;color:var(--sci-t);line-height:1.6;font-style:italic}

/* cta band */
#cb{padding:100px 0;text-align:center;background:var(--ink)}
.cb-tag{font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:rgba(155,125,58,.7);margin-bottom:14px}
.cb-h{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,7vw,60px);font-weight:300;color:var(--w);line-height:1.05;margin-bottom:12px}
.cb-h em{font-style:italic;color:var(--gold)}
.cb-s{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:36px;font-style:italic}
.btn-g{padding:14px 48px;background:var(--gold);color:var(--w);font-size:12px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s}
.btn-g:hover{background:#B8971F}

/* paul */
#paul{padding:100px 0;border-top:1px solid var(--line)}
.pgd{display:grid;grid-template-columns:1fr 2fr;gap:60px;align-items:start}
.pvt{font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:300;color:rgba(0,0,0,.05);writing-mode:vertical-rl;letter-spacing:.1em;line-height:1}
.pq{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,4vw,30px);font-weight:300;font-style:italic;color:var(--ink);line-height:1.35;margin-bottom:18px}
.pq::before{content:'”';color:var(--gold);font-size:1.3em;line-height:0;vertical-align:-.3em;margin-right:3px}
.pp{font-size:13px;color:var(--ink2);line-height:1.85;margin-bottom:14px;font-style:italic}
.ph2{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink3)}
footer{padding:28px 24px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line2);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);position:relative;z-index:2}

/* quiz */
#sn{padding:100px 0 80px}
.nw{max-width:420px}
.nt{font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.nh{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,40px);font-weight:300;color:var(--ink);margin-bottom:6px;line-height:1.2}
.nhint{font-size:13px;color:var(--ink3);margin-bottom:36px;font-style:italic}
.ninp{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--ink);background:transparent;border:none;border-bottom:1px solid var(--ink);padding:8px 0;outline:none;width:100%;max-width:300px;transition:border-color .3s}
.ninp::placeholder{color:var(--line);font-style:italic}
.ninp:focus{border-color:var(--gold)}
.btn-p{margin-top:32px;padding:14px 40px;background:var(--ink);color:var(--w);font-size:12px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s;display:inline-block}
.btn-p:hover{background:var(--gold)}

#sq{padding:80px 0 100px}
.qt{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;padding-bottom:12px;border-bottom:1px solid var(--line2)}
.qtb{display:flex;align-items:center;gap:10px}
.qtl{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:var(--gold);line-height:1}
.qtp{font-size:9px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.qtm{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--ink)}
.qtc{text-align:right}
.qtn{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:300;color:var(--ink);line-height:1}
.qtof{font-size:9px;letter-spacing:.2em;color:var(--ink3);text-transform:uppercase}
.qbw{width:100%;height:1px;background:var(--line2);margin-bottom:40px}
.qbf{height:100%;background:var(--gold);transition:width .3s}
.qtxt{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,4vw,30px);font-weight:300;color:var(--ink);line-height:1.25;max-width:540px;margin-bottom:44px}
.yn{display:flex;gap:10px}
.yb{padding:13px 40px;font-size:12px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--line);background:transparent;cursor:pointer;transition:all .2s;color:var(--ink2);min-width:120px}
.yb.y:hover,.yb.y.on{background:var(--ink);color:var(--w);border-color:var(--ink)}
.yb.n:hover,.yb.n.on{background:var(--off);color:var(--ink);border-color:var(--ink)}
.qbk{margin-top:24px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);background:none;border:none;cursor:pointer;transition:color .2s}
.qbk:hover{color:var(--ink)}

/* generating */
.gt{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,40px);font-weight:300;color:var(--ink);margin-bottom:10px;animation:breathe 3s ease-in-out infinite}
.gs2{font-size:13px;color:var(--ink3);margin-bottom:40px;font-style:italic}
.gst{display:flex;flex-direction:column;gap:9px;text-align:left}
.gsp{font-size:12px;color:rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;letter-spacing:.05em;transition:color .4s}
.gsp.act{color:var(--ink)}.gsp.done{color:var(--gold)}
.gd{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}

/* result */
#sr{display:none;padding:80px 0 100px}
#sr.on{display:block}
.rw{max-width:680px;margin:0 auto}
.re{font-size:10px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.rh{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,7vw,58px);font-weight:300;line-height:.95;color:var(--ink);margin-bottom:8px}
.rh em{font-style:italic;color:var(--gold)}
.rf{font-size:14px;color:var(--ink3);margin-bottom:48px;font-style:italic}
.scr2{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line2)}
.scl{font-size:12px;color:var(--ink);width:150px;flex-shrink:0}
.scb{flex:1;height:1px;background:var(--line2)}
.scbf{height:100%;transition:width 1s ease}
.scp{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:var(--ink);width:32px;text-align:right;flex-shrink:0}
.sct{font-size:9px;letter-spacing:.2em;text-transform:uppercase;width:68px;text-align:right;flex-shrink:0}
.bp{margin-bottom:24px;padding:28px 32px;border:1px solid var(--line2);position:relative;transition:border-color .3s}
.bp:hover{border-color:rgba(155,125,58,.2)}
.bpn{position:absolute;top:20px;right:24px;font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:rgba(0,0,0,.04);line-height:1}
.bpt{font-size:9px;font-weight:500;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:5px}
.bptitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--ink);margin-bottom:12px}
.bpc{font-size:13px;color:var(--ink2);line-height:1.9;white-space:pre-wrap}
.dlw{text-align:center;padding:48px 0;border-top:1px solid var(--line2);margin-top:40px}
.dlh{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--ink);margin-bottom:7px}
.dlh em{font-style:italic;color:var(--gold)}
.dls{font-size:13px;color:var(--ink3);margin-bottom:26px;font-style:italic}
.bgh{display:block;margin:12px auto 0;background:none;border:none;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* animations */
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.5}50%{opacity:1}}
.rv{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
.rv.on{opacity:1;transform:translateY(0)}

/* mobile */
@media(max-width:600px){
nav{padding:11px 14px}
.nav-logo{display:none}
.lb{padding:3px 6px;font-size:9px}
.w{padding:0 14px}
.ag{grid-template-columns:1fr}
.pg{grid-template-columns:1fr}
.ain{grid-template-columns:1fr;padding:0 0 16px 0}
.atea,.alst{grid-column:1}
.acc.open .ab2{max-height:520px}
.pgd{grid-template-columns:1fr;gap:18px}
.pvt{writing-mode:horizontal-tb;font-size:34px}
.yn{flex-direction:column;width:100%;max-width:240px}
.yb{min-width:auto;width:100%}
.scl{width:110px}
.sct{display:none}
.bp{padding:18px 16px}
footer{flex-direction:column;gap:7px;text-align:center}
}
</style>
